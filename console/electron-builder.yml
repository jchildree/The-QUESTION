appId: com.thequestion.console
productName: The Question Console

directories:
  output: release/

files:
  - dist/**
  - dist-electron/**
  - node_modules/**
  - "!node_modules/.bin"
  - package.json

extraFiles:
  - from: ../the-question/the-question
    to: resources/plugin
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
